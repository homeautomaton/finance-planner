<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financial Forecast</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg:#141414;
    --panel:#1f1f1f;
    --text:#ddd;
    --muted:#888;
    --border:#333;
}

body {
    margin:0;
    font-family: system-ui;
    background:var(--bg);
    color:var(--text);
}

.app {
    display:grid;
    grid-template-columns: 340px 1fr;
    height:100vh;
}

.sidebar {
    background:var(--panel);
    padding:14px;
    overflow:auto;
}

.field {
    display:flex;
    flex-direction:column;
    margin-bottom:10px;
}

input, textarea {
    background:#111;
    color:white;
    border:1px solid var(--border);
    padding:6px;
    border-radius:6px;
}

button {
    background:#333;
    color:white;
    border:1px solid #555;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

.main {
    position:relative;
    background:white;
    padding:10px;
}

.chartWrap {
    position:relative;
    height:100%;
}

canvas {
    width:100%;
    height:100%;
}

/* OVERLAY DEATH SCREEN */
.deathOverlay {
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.45);
    z-index:20;
    cursor:pointer;
}

.deathOverlay.dismissed {
    pointer-events:none;
    background:transparent;
}

#deathImage {
    max-width:min(90%, 700px);
    max-height:85%;
    border-radius:14px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    transition:
        transform 0.35s ease,
        opacity 0.35s ease;
}

.deathOverlay.dismissed #deathImage {
    transform:
        translate(38vw, 32vh)
        scale(0.22);
    opacity:0.45;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <h2>Forecast</h2>

    <div class="field">Starting Balance
        <input id="startingBalance" type="number" value="10000">
    </div>

    <div class="field">Birth Year
        <input id="birthYear" type="number" value="2001">
    </div>

    <div class="field">Years
        <input id="years" type="number" value="30">
    </div>

    <div class="field">Return %
        <input id="returnRate" type="number" value="3">
    </div>

    <div class="field">Inflation %
        <input id="inflationRate" type="number" value="3">
    </div>

    <div class="field">Raises %
        <input id="raiseRate" type="number" value="3">
    </div>

    <div class="field">Salary after taxes
        <input id="startingSalary" type="number" value="30000">
    </div>

    <div class="field">Spending
        <input id="startingSpending" type="number" value="25000">
    </div>

    <button id="reset">Reset</button>
    <button id="load">Load JSON</button>

    <h3>Scenario JSON</h3>
    <textarea id="json"></textarea>
</div>

<div class="main">
    <div class="chartWrap">
        <canvas id="c"></canvas>
        <div class="deathOverlay" id="death">
            <img id="deathImage" src="dys.png" alt="You have died of dysentery.">
        </div>
    </div>
</div>

</div>

<script>

const DEBT_LIMIT = -1000000;

let chart;
let drag = null;
let freezeScale = false;
let deathDismissed = false;

function y(v){return Number(v)}

function build() {

    const labels=[], bal=[], sal=[], sp=[];

    let salary = state.startingSalary;
    let spend = state.startingSpending;
    let balance = state.startingBalance;

    const years = state.years;

    for(let i=0;i<years;i++){

        const year = state.presentYear + i;
        const age = year - state.birthYear;

        labels.push(`${year} (Age ${age})`);

        if(state.salaryAdjustments[year] != null)
            salary = state.salaryAdjustments[year];

        if(state.spendingAdjustments[year] != null)
            spend = state.spendingAdjustments[year];

        balance = balance*(1+state.returnRate/100)
                + salary - spend;

        if(state.balanceActuals[year] != null)
            balance = state.balanceActuals[year];

        balance = Math.max(DEBT_LIMIT,balance);

        sal.push(salary);
        sp.push(spend);
        bal.push(balance);

        salary *= (1+(state.raiseRate)/100);
        spend *= (1+state.inflationRate/100);
    }

    return {labels,bal,sal,sp};
}

function render(){

    const d = build();

    const dead = d.bal.some(v => v <= DEBT_LIMIT);

    const deathEl = document.getElementById("death");

    deathEl.style.display = dead ? "flex" : "none";

    if (!dead) {
        deathDismissed = false;
        deathEl.classList.remove("dismissed");
    }

    const data = {
        labels:d.labels,
        datasets:[
            {label:"Balance",data:d.bal,borderColor:"blue"},
            {label:"Salary",data:d.sal,borderColor:"green"},
            {label:"Spending",data:d.sp,borderColor:"red"}
        ]
    };

    if(!chart){

        chart = new Chart(c,{
            type:"line",
            data,
            options:{
                animation:false,
                interaction:{intersect:false},
                scales:{y:{beginAtZero:false}},
                responsive:true,
                maintainAspectRatio:false
            }
        });

        hook();

        document.getElementById("death").onclick = () => {

            if (!document.getElementById("death").style.display)
                return;

            deathDismissed = !deathDismissed;
        
            document
                .getElementById("death")
                .classList.toggle("dismissed", deathDismissed);
        };
    } else {
        chart.data=data;
        if(!freezeScale) chart.update();
        else chart.update("none");
    }

    document.getElementById("json").value =
        JSON.stringify(state,null,2);
}

function hook(){

    const c = chart.canvas;

    c.onmousedown = e=>{
        const pts = chart.getElementsAtEventForMode(
            e,"nearest",{intersect:true},true
        );
        if(!pts.length) return;

        drag = pts[0];
        freezeScale = true;
    };

    window.onmouseup = ()=>{
        if(!drag) return;
        drag=null;
        freezeScale=false;
        render();
    };

    window.onmousemove = e=>{
        if(!drag) return;

        const rect = c.getBoundingClientRect();
        const yv = Math.round(chart.scales.y.getValueForPixel(e.clientY-rect.top));

        const ds = chart.data.datasets[drag.datasetIndex];
        const label = chart.data.labels[drag.index];
        const year = parseInt(label);

        ds.data[drag.index] = yv;

        if(drag.datasetIndex===0)
            state.balanceActuals[year]=yv;

        if(drag.datasetIndex===1)
            state.salaryAdjustments[year]=Math.max(yv,0);

        if(drag.datasetIndex===2)
            state.spendingAdjustments[year]=Math.max(yv,0);

        chart.update("none");
    };
}

//function loadJSON(){ state = JSON.parse(json.value); render(); }

const DEFAULT_STATE = {
    presentYear: new Date().getFullYear(),
    startingBalance:10000,
    birthYear:2001,
    years:30,
    returnRate:3,
    inflationRate:3,
    raiseRate:3,
    startingSalary:30000,
    startingSpending:25000,
    salaryAdjustments:{},
    spendingAdjustments:{},
    balanceActuals:{}
};

let state = structuredClone(DEFAULT_STATE);

function syncInputsFromState(){

    document.getElementById("startingBalance").value = state.startingBalance;
    document.getElementById("birthYear").value = state.birthYear;
    document.getElementById("years").value = state.years;
    document.getElementById("returnRate").value = state.returnRate;
    document.getElementById("inflationRate").value = state.inflationRate;
    document.getElementById("raiseRate").value = state.raiseRate;
    document.getElementById("startingSalary").value = state.startingSalary;
    document.getElementById("startingSpending").value = state.startingSpending;
}

function loadJSON(){

    try {

        const loaded = JSON.parse(
            document.getElementById("json").value
        );

        state = {
            ...structuredClone(DEFAULT_STATE),
            ...loaded
        };

        state.salaryAdjustments ??= {};
        state.spendingAdjustments ??= {};
        state.balanceActuals ??= {};

        syncInputsFromState();

        render();

    } catch(err){

        console.error(err);
        alert("Invalid JSON");
    }
}

function do_reset(){
    location.reload();
}

document.querySelectorAll("input").forEach(i=>{
    i.oninput=()=>{
        Object.assign(state,{
            startingBalance:y(startingBalance.value),
            birthYear:y(birthYear.value),
            years:y(years.value),
            returnRate:y(returnRate.value),
            inflationRate:y(inflationRate.value),
            raiseRate:y(raiseRate.value),
            startingSalary:y(startingSalary.value),
            startingSpending:y(startingSpending.value)
        });
        render();
    };
});

load.onclick=loadJSON;
reset.onclick=do_reset;

render();

</script>

</body>
</html>
